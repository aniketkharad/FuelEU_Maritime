version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fueleu_postgres
    environment:
      POSTGRES_USER: fueleu
      POSTGRES_PASSWORD: fueleu_pass
      POSTGRES_DB: fueleu_maritime
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U fueleu -d fueleu_maritime' ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: fueleu_backend
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://fueleu:fueleu_pass@postgres:5432/fueleu_maritime?schema=public
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
